name: Generate Documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      generate_docs:
        description: 'Generate WIDOCO documentation'
        required: true
        default: 'true'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'
    
    - name: Download WIDOCO
      run: |
        wget https://github.com/dgarijo/Widoco/releases/download/v1.4.16/widoco-1.4.16-jar-with-dependencies.jar -O widoco.jar
        chmod +x widoco.jar
    
    - name: Generate WIDOCO documentation
      run: |
        echo "Generating WIDOCO documentation..."
        java -jar widoco.jar \
          -ontFile ontology/inmobiliaria.ttl \
          -outFolder documentation/widoco \
          -rewriteAll \
          -getOntologyMetadata \
          -oops \
          -includeImportedOntologies
    
    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v3
      with:
        name: widoco-documentation
        path: documentation/widoco/
    
    - name: Create GitHub Pages deployment
      if: github.event_name == 'release'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./documentation/widoco
        publish_branch: gh-pages
    
    - name: Summary
      run: |
        echo "Documentation Generation Summary:"
        echo "- WIDOCO documentation generated successfully"
        echo "- Documentation uploaded as artifact"
        echo "- Documentation deployed to GitHub Pages (on release)"
